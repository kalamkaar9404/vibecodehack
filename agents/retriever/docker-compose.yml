services:
  retriever:
    build: .
    container_name: medsync-retriever
    ports:
      - "5002:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - GOOGLE_GENAI_USE_VERTEXAI=FALSE
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - MEDSYNC_MODEL=${MEDSYNC_MODEL:-gemini-2.5-flash}
    networks:
      - agents-net

networks:
  agents-net:
    driver: bridge
